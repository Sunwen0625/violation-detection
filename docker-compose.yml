services:
  postgres:
    image: postgres:16
    container_name: project_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project_fastapi
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network: